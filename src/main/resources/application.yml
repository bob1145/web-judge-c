spring:
  application:
    name: demo18
  security:
    user:
      name: admin_ed
      password: admin_wx13
      roles: ADMIN

server:
  address: 0.0.0.0
  port: 1234

app:
  websocket:
    allowed-origins: "https://yourdomain.com,http://localhost:*,https://localhost:*"

judge:
  auth:
    access-code: "123"
    default-access-code: "123"
    account-auth-enabled: false
    accounts: []
    session-timeout: 30d
    normal-session-timeout: 24h
    max-attempts: 5
    attempt-reset-hours: 1
  
  memory:
    default-limit: 268435456  # 256MB
    max-limit: 1073741824     # 1GB
    check-interval: 100       # ms

  execution:
    profile: trusted-local
    max-cases-per-task: 10000
    large-mode-threshold: 5000
    task-queue-capacity: 10
    max-concurrent-tasks: 1
    max-concurrent-cases-per-task: 4
    batch-size: 100
    max-daily-cases-per-user: 200000
    max-daily-runtime-millis-per-user: 1000000000
    max-running-tasks-per-user: 1
    max-queued-tasks-per-user: 5
    cleanup-interval: 30m
    completed-retention: 24h
    cancelled-retention: 24h
    failed-retention: 24h
    stale-retention: 1h
    default-time-limit: 2s
    min-time-limit: 100ms
    max-time-limit: 30s
    max-task-runtime: 30m
    min-memory-limit-bytes: 16777216
    max-output-bytes-per-case: 1048576
    require-sandbox: false
  
  compiler:
    default-standard: cpp17
    default-optimization: O2
    timeout: 60s
  
  sandbox:
    enabled: false  # Windows系统下建议禁用沙箱，Linux系统可设为true
    base-directory: C:/temp/judge-sandbox  # Windows路径格式
    network-disabled: true
    max-processes: 10
    production:
      provider: direct
      isolation: process
      security-profile: ""
      capability-probe-required: false
      capability-probe-passed: false
      worker:
        endpoint: ""
        auth-token: ""
        mtls-certificate: ""

logging:
  level:
    com.example.demo: INFO  # 改为INFO级别，减少debug输出
    com.example.demo.service.JudgeService: WARN  # 判题服务只记录警告以上
    com.example.demo.service.SandboxService: WARN  # 沙箱服务只记录警告以上
    com.example.demo.service.MemoryMonitorService: WARN  # 内存监控只记录警告以上
    org.springframework.security: WARN  # Spring Security只记录警告
    org.springframework.web.socket: WARN  # WebSocket只记录警告
    org.springframework.messaging: WARN  # 消息框架只记录警告
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/judge-system.log
  logback:
    rolling policy:
      max-file-size: 10MB
      max-history: 30

---
spring:
  config:
    activate:
      on-profile: local-large

judge:
  execution:
    profile: local-large
    max-cases-per-task: 100000
    large-mode-threshold: 5000
    task-queue-capacity: 3
    max-concurrent-tasks: 1
    max-concurrent-cases-per-task: 4
    batch-size: 100
    max-task-runtime: 2h
    require-sandbox: false

---
spring:
  config:
    activate:
      on-profile: intranet-large

judge:
  execution:
    profile: intranet-large
    max-cases-per-task: 100000
    large-mode-threshold: 5000
    task-queue-capacity: 20
    max-concurrent-tasks: 2
    max-concurrent-cases-per-task: 4
    batch-size: 100
    max-task-runtime: 2h
    require-sandbox: true

---
spring:
  config:
    activate:
      on-profile: windows-prod

judge:
  execution:
    profile: windows-prod
    require-sandbox: true
  sandbox:
    enabled: true
    production:
      provider: windows-container
      isolation: hyper-v
      security-profile: hyper-v;job-object
      capability-probe-required: true
      capability-probe-passed: false
      windows-container:
        runtime-command: docker
        image: cpp-judge-runner-windows:latest
        container-user: ContainerUser
        work-mount: "C:\\work"
        runner-command: "C:\\judge-runner\\run-task.exe"
        probe-command: "C:\\judge-runner\\probe.cmd"
        task-spec-file: sandbox-task.json
        event-file: events.jsonl
        cpus: 1.0
        probe-memory-bytes: 268435456
        command-timeout: 30s

---
spring:
  config:
    activate:
      on-profile: linux-prod

judge:
  execution:
    profile: linux-prod
    require-sandbox: true
  sandbox:
    enabled: true
    production:
      provider: linux-container
      isolation: container
      security-profile: seccomp:judge-linux
      capability-probe-required: true
      capability-probe-passed: false
      linux-container:
        runtime-command: docker
        image: cpp-judge-runner:latest
        container-user: "65532:65532"
        work-mount: /work
        runner-command: /opt/judge-runner/run-task
        task-spec-file: sandbox-task.json
        event-file: events.jsonl
        pids-limit: 64
        cpus: 1.0
        command-timeout: 30s

---
spring:
  config:
    activate:
      on-profile: worker-prod

judge:
  execution:
    profile: worker-prod
    require-sandbox: true
  sandbox:
    enabled: true
    production:
      provider: remote-worker
      isolation: remote
      security-profile: worker-policy
      capability-probe-required: true
      capability-probe-passed: false
      worker:
        endpoint: ""
        auth-token: ""
        mtls-certificate: ""
